<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lusync</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #0d1f3c;
  --navy-light: #162d54;
  --violet: #2563eb;
  --violet-light: #60a5fa;
  --bg: #f0f1fa;
  --white: #ffffff;
  --border: rgba(0,0,0,0.08);
  --text: #1a1a2e;
  --muted: #6b7280;
  --hint: #9ca3af;
  --success: #1D9E75;
  --success-bg: #eaf3ee;
  --danger: #E24B4A;
  --danger-bg: #fef2f2;
  --warn: #BA7517;
  --warn-bg: #fef9ee;
  --info-bg: #eef2ff;
  --radius: 10px;
  --radius-lg: 14px;
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.5;
}

/* ── SCREENS ── */
.screen { display: none; }
.screen.active { display: block; }

/* ── LOGIN ── */
#loginScreen {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg);
  padding: 24px;
}

.login-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 40px 36px;
  width: 100%;
  max-width: 400px;
  box-shadow: var(--shadow);
}

.login-brand {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 36px;
}

.brand-mark {
  width: 46px;
  height: 46px;
  background: var(--navy);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.brand-mark span {
  color: white;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.5px;
}

.brand-name {
  font-size: 20px;
  font-weight: 600;
  color: var(--navy);
  line-height: 1.2;
}

.brand-tagline {
  font-size: 12px;
  color: var(--muted);
  margin-top: 2px;
}

.login-heading {
  font-size: 17px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 4px;
}

.login-sub {
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 28px;
}

.field {
  margin-bottom: 16px;
}

.field label {
  display: block;
  font-size: 12px;
  font-weight: 500;
  color: var(--muted);
  margin-bottom: 6px;
  letter-spacing: 0.3px;
}

.field input {
  width: 100%;
  padding: 10px 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-size: 14px;
  font-family: 'DM Sans', sans-serif;
  color: var(--text);
  background: var(--white);
  transition: border-color 0.15s;
  outline: none;
}

.field input:focus {
  border-color: var(--violet);
  box-shadow: 0 0 0 3px rgba(133,118,255,0.1);
}

.btn-login {
  width: 100%;
  background: var(--navy);
  color: white;
  border: none;
  padding: 11px;
  border-radius: var(--radius);
  font-size: 14px;
  font-weight: 500;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer;
  margin-top: 8px;
  transition: background 0.15s, transform 0.1s;
}

.btn-login:hover { background: var(--navy-light); }
.btn-login:active { transform: scale(0.99); }

.login-error {
  display: none;
  background: var(--danger-bg);
  color: var(--danger);
  font-size: 12px;
  padding: 8px 12px;
  border-radius: var(--radius);
  margin-top: 12px;
  text-align: center;
}

.login-footer {
  text-align: center;
  margin-top: 24px;
  font-size: 11px;
  color: var(--hint);
}

/* ── NAVBAR ── */
.navbar {
  background: var(--navy);
  height: 56px;
  padding: 0 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}

.navbar-brand {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
}

.navbar-mark {
  width: 30px;
  height: 30px;
  background: var(--violet);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 600;
  color: white;
  letter-spacing: 0.3px;
}

.navbar-name {
  font-size: 14px;
  font-weight: 600;
  color: white;
}

.navbar-nav {
  display: flex;
  align-items: center;
  gap: 2px;
}

.nav-btn {
  background: none;
  border: none;
  color: rgba(255,255,255,0.55);
  font-size: 13px;
  font-family: 'DM Sans', sans-serif;
  padding: 6px 13px;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.15s;
  font-weight: 400;
}

.nav-btn:hover { color: white; background: rgba(255,255,255,0.08); }
.nav-btn.active { color: white; background: rgba(255,255,255,0.12); }

.navbar-right {
  display: flex;
  align-items: center;
  gap: 10px;
}

.navbar-avatar {
  width: 32px;
  height: 32px;
  background: var(--violet);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 600;
  color: white;
}

.navbar-username {
  font-size: 13px;
  color: rgba(255,255,255,0.7);
}

.btn-logout {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.12);
  color: rgba(255,255,255,0.6);
  font-size: 12px;
  font-family: 'DM Sans', sans-serif;
  padding: 5px 12px;
  border-radius: 7px;
  cursor: pointer;
  transition: all 0.15s;
}

.btn-logout:hover { background: rgba(255,255,255,0.15); color: white; }

/* ── MAIN LAYOUT ── */
.main {
  padding: 24px;
  max-width: 1200px;
  margin: 0 auto;
}

/* ── PAGE HEADER ── */
.page-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 20px;
}

.page-title {
  font-size: 20px;
  font-weight: 600;
  color: var(--navy);
}

.page-date {
  font-size: 12px;
  color: var(--muted);
  margin-top: 3px;
}

.header-actions {
  display: flex;
  gap: 8px;
}

.btn-primary {
  background: var(--navy);
  color: white;
  border: none;
  padding: 9px 16px;
  border-radius: var(--radius);
  font-size: 13px;
  font-weight: 500;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer;
  transition: all 0.15s;
}

.btn-primary:hover { background: var(--violet); }

.btn-secondary {
  background: var(--white);
  color: var(--text);
  border: 1px solid var(--border);
  padding: 9px 16px;
  border-radius: var(--radius);
  font-size: 13px;
  font-weight: 500;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer;
  transition: all 0.15s;
}

.btn-secondary:hover { border-color: var(--navy); }

/* ── METRICS ── */
.metrics-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin-bottom: 20px;
}

.metric-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 16px 18px;
  box-shadow: var(--shadow);
}

.metric-label {
  font-size: 11px;
  font-weight: 500;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 8px;
}

.metric-value {
  font-size: 28px;
  font-weight: 600;
  color: var(--navy);
  line-height: 1;
  margin-bottom: 6px;
  font-family: 'DM Mono', monospace;
}

.metric-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  font-weight: 500;
  padding: 2px 8px;
  border-radius: 20px;
}

.badge-up { background: var(--success-bg); color: var(--success); }
.badge-down { background: var(--danger-bg); color: var(--danger); }
.badge-warn { background: var(--warn-bg); color: var(--warn); }
.badge-info { background: var(--info-bg); color: var(--navy); }

/* ── DASH GRID ── */
.dash-grid {
  display: grid;
  grid-template-columns: 1fr 340px;
  gap: 16px;
  margin-bottom: 16px;
}

.card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px;
  box-shadow: var(--shadow);
}

.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}

.card-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
}

.card-tag {
  font-size: 11px;
  color: var(--muted);
  background: var(--bg);
  padding: 3px 8px;
  border-radius: 20px;
}

/* ── BAR CHART ── */
.bar-chart {
  display: flex;
  align-items: flex-end;
  gap: 10px;
  height: 120px;
  padding-top: 8px;
}

.bar-col {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  height: 100%;
  justify-content: flex-end;
}

.bar-val {
  font-size: 10px;
  font-weight: 500;
  color: var(--muted);
  font-family: 'DM Mono', monospace;
}

.bar-fill {
  width: 100%;
  border-radius: 5px 5px 0 0;
  background: var(--navy);
  min-height: 4px;
  transition: background 0.2s;
}

.bar-fill.highlight { background: var(--violet); }

.bar-day {
  font-size: 10px;
  color: var(--hint);
}

/* ── STOCK BAJO ── */
.stock-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.stock-row {
  display: flex;
  align-items: center;
  gap: 10px;
}

.stock-name {
  font-size: 12px;
  color: var(--text);
  width: 110px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex-shrink: 0;
}

.stock-track {
  flex: 1;
  height: 5px;
  background: var(--bg);
  border-radius: 3px;
  overflow: hidden;
}

.stock-fill {
  height: 100%;
  border-radius: 3px;
}

.stock-count {
  font-size: 12px;
  font-weight: 600;
  font-family: 'DM Mono', monospace;
  width: 20px;
  text-align: right;
  flex-shrink: 0;
}

/* ── ACTIVIDAD ── */
.activity-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.activity-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 12px;
  background: var(--bg);
  border-radius: var(--radius);
}

.activity-icon {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 600;
  flex-shrink: 0;
}

.icon-venta { background: var(--info-bg); color: var(--navy); }
.icon-entrada { background: var(--success-bg); color: var(--success); }
.icon-salida { background: var(--danger-bg); color: var(--danger); }

.activity-desc {
  flex: 1;
  font-size: 12px;
  color: var(--text);
  line-height: 1.4;
}

.activity-time {
  font-size: 11px;
  color: var(--hint);
  flex-shrink: 0;
}

/* ── INVENTARIO ── */
.inv-toolbar {
  display: flex;
  gap: 10px;
  margin-bottom: 16px;
  align-items: center;
}

.search-input {
  flex: 1;
  padding: 9px 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-size: 13px;
  font-family: 'DM Sans', sans-serif;
  color: var(--text);
  background: var(--white);
  outline: none;
  transition: border-color 0.15s;
}

.search-input:focus { border-color: var(--violet); }

.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr auto;
  gap: 8px;
  margin-bottom: 16px;
  align-items: end;
}

.form-group label {
  display: block;
  font-size: 11px;
  font-weight: 500;
  color: var(--muted);
  margin-bottom: 5px;
}

.form-group input,
.form-group select {
  width: 100%;
  padding: 9px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-size: 13px;
  font-family: 'DM Sans', sans-serif;
  color: var(--text);
  background: var(--white);
  outline: none;
}

.form-group input:focus,
.form-group select:focus { border-color: var(--violet); }

.section-label {
  font-size: 12px;
  font-weight: 600;
  color: var(--navy);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin: 20px 0 10px;
}

/* ── TABLE ── */
.table-wrap {
  overflow-x: auto;
  border-radius: var(--radius-lg);
  border: 1px solid var(--border);
}

table {
  width: 100%;
  border-collapse: collapse;
  background: var(--white);
}

thead th {
  background: var(--navy);
  color: white;
  padding: 11px 14px;
  font-size: 11px;
  font-weight: 600;
  text-align: left;
  letter-spacing: 0.4px;
  text-transform: uppercase;
}

thead th:first-child { border-radius: var(--radius-lg) 0 0 0; }
thead th:last-child { border-radius: 0 var(--radius-lg) 0 0; }

tbody tr {
  border-bottom: 1px solid var(--border);
  transition: background 0.1s;
}

tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: #f8f9ff; }

tbody td {
  padding: 11px 14px;
  font-size: 13px;
  color: var(--text);
}

.sku-code {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  background: var(--bg);
  padding: 2px 7px;
  border-radius: 4px;
}

.stock-pill {
  display: inline-block;
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  font-weight: 600;
  padding: 3px 10px;
  border-radius: 20px;
}

.pill-ok { background: var(--success-bg); color: var(--success); }
.pill-warn { background: var(--warn-bg); color: var(--warn); }
.pill-danger { background: var(--danger-bg); color: var(--danger); }

/* ── HISTORIAL LATERAL ── */
.layout-inv {
  display: grid;
  grid-template-columns: 1fr 280px;
  gap: 16px;
}

.hist-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
  max-height: 500px;
  overflow-y: auto;
}

.hist-item {
  font-size: 12px;
  color: var(--text);
  padding: 8px 10px;
  background: var(--bg);
  border-radius: 8px;
  line-height: 1.4;
}

/* ── TOAST ── */
#toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: var(--navy);
  color: white;
  padding: 12px 20px;
  border-radius: var(--radius);
  font-size: 13px;
  font-weight: 500;
  opacity: 0;
  transform: translateY(10px);
  transition: all 0.25s;
  z-index: 999;
  pointer-events: none;
}

#toast.show {
  opacity: 1;
  transform: translateY(0);
}

/* ── TABS ── */
.section-tabs {
  display: flex;
  gap: 4px;
  margin-bottom: 16px;
}

.stab {
  padding: 7px 16px;
  border-radius: 8px;
  font-size: 13px;
  border: 1px solid var(--border);
  background: var(--white);
  color: var(--muted);
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  transition: all 0.15s;
}

.stab.active {
  background: var(--navy);
  color: white;
  border-color: var(--navy);
}

/* ── RESPONSIVE ── */
@media (max-width: 900px) {
  .metrics-grid { grid-template-columns: repeat(2, 1fr); }
  .dash-grid { grid-template-columns: 1fr; }
  .layout-inv { grid-template-columns: 1fr; }
  .form-row { grid-template-columns: 1fr 1fr; }
  .navbar-nav { display: none; }
}
</style>
</head>
<body>

<div id="toast"></div>

<!-- ═══════════════ LOGIN ═══════════════ -->
<div id="loginScreen" class="screen active">
  <div style="min-height:100vh; display:flex; align-items:center; justify-content:center; background:var(--bg); padding:24px;">
    <div class="login-card">
      <div class="login-brand">
        <div class="brand-mark"><span>LS</span></div>
        <div>
          <div class="brand-name">Lusync</div>
          <div class="brand-tagline">Sincroniza todo tu negocio</div>
        </div>
      </div>
      <div class="login-heading">Bienvenido de vuelta</div>
      <div class="login-sub">Ingresa tus credenciales para acceder al panel</div>
      <form onsubmit="doLogin(event)">
        <div class="field">
          <label>Correo electrónico</label>
          <input type="text" id="loginUser" placeholder="correo@babymine.cl" autocomplete="username">
        </div>
        <div class="field">
          <label>Contraseña</label>
          <div style="position:relative;">
            <input type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password" style="padding-right:40px;">
            <button type="button" onclick="togglePass()" id="togglePassBtn" aria-label="Mostrar/ocultar contraseña" style="position:absolute; right:8px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; padding:6px; display:flex; align-items:center; justify-content:center; color:var(--muted);">
              <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>
        <button type="submit" class="btn-login">Ingresar al panel</button>
      </form>
      <div id="loginError" class="login-error">Credenciales incorrectas. Intenta nuevamente.</div>
      <div class="login-footer">Lusync v1.0 &mdash; Acceso solo personal autorizado</div>
    </div>
  </div>
</div>

<!-- ═══════════════ DASHBOARD ═══════════════ -->

<script>
// ── TOGGLE PASSWORD
function togglePass(){
  const input = document.getElementById('loginPass');
  const icon = document.getElementById('eyeIcon');
  if(input.type === 'password'){
    input.type = 'text';
    icon.innerHTML = '<path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" x2="22" y1="2" y2="22"/>';
  } else {
    input.type = 'password';
    icon.innerHTML = '<path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/>';
  }
}

// ── LOGIN
function doLogin(e){
  e.preventDefault();
  const user = document.getElementById('loginUser').value.trim();
  const pass = document.getElementById('loginPass').value;

  fetch('/login_check', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({user, password: pass})
  })
  .then(r => r.json())
  .then(d => {
    if(d.ok){
      window.location.href = '/panel';
    } else {
      document.getElementById('loginError').style.display = 'block';
    }
  })
  .catch(() => {
    document.getElementById('loginError').style.display = 'block';
  });
}
</script>
</body>
</html>
